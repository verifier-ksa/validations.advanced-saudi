<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Inspection Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .card-container {
            max-width: 100%;
            width: 450px; /* কার্ডের সুন্দর একটি সাইজ */
            padding: 20px;
            box-sizing: border-box;
        }
        .card-container img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: block;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <img src="55659.png" alt="Manlift Operator Card">
    </div>

</body>
</html>
